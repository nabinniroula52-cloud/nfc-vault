<script>
let APPROVED_TAG = null; // No tag registered yet
let unlocked = false;
let autoLockTimer;

// Restore registered tag on load
window.addEventListener("load", () => {
    const savedTag = localStorage.getItem("registeredTag");
    if (savedTag) APPROVED_TAG = savedTag.toUpperCase().replace(/:/g, '');
});

async function getKey() {
    const enc = new TextEncoder();
    return crypto.subtle.importKey(
        "raw",
        enc.encode("super-secret-key-123"),
        { name: "AES-GCM" },
        false,
        ["encrypt", "decrypt"]
    );
}

async function encrypt(text) {
    const key = await getKey();
    const iv = crypto.getRandomValues(new Uint8Array(12));

    const encoded = new TextEncoder().encode(text);
    const cipher = await crypto.subtle.encrypt(
        { name: "AES-GCM", iv },
        key,
        encoded
    );

    return {
        iv: Array.from(iv),
        data: Array.from(new Uint8Array(cipher))
    };
}

async function decrypt(iv, data) {
    const key = await getKey();

    const decrypted = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv: new Uint8Array(iv) },
        key,
        new Uint8Array(data)
    );

    return new TextDecoder().decode(decrypted);
}

async function startScan() {
    if (!("NDEFReader" in window)) {
        alert("NFC not supported on this device.");
        return;
    }

    const ndef = new NDEFReader();

    try {
        await ndef.scan();
        document.getElementById("status").innerText = "Tap NFC tag...";

        ndef.onreading = async event => {
            // Normalize UID: remove colons and uppercase
            const id = event.serialNumber.replace(/:/g, '').toUpperCase();

            if (!APPROVED_TAG) {
                // Register the first scanned tag
                APPROVED_TAG = id;
                localStorage.setItem("registeredTag", APPROVED_TAG);
                unlock();
                alert("Tag registered and vault unlocked ✅");
            } else if (id === APPROVED_TAG) {
                unlock();
            } else {
                document.getElementById("status").innerText = "❌ Wrong Tag";
            }
        };

    } catch (err) {
        alert("Error: " + err);
    }
}

async function unlock() {
    unlocked = true;
    document.getElementById("vault").style.display = "block";
    document.getElementById("status").innerText = "✅ Unlocked";

    const saved = localStorage.getItem("vault");

    if (saved) {
        const parsed = JSON.parse(saved);
        const text = await decrypt(parsed.iv, parsed.data);
        document.getElementById("notes").value = text;
    }

    startAutoLock();
}

function lock() {
    unlocked = false;
    document.getElementById("vault").style.display = "none";
    document.getElementById("notes").value = "";
    document.getElementById("status").innerText = "🔒 Locked";
}

function startAutoLock() {
    clearTimeout(autoLockTimer);

    autoLockTimer = setTimeout(() => {
        lock();
    }, 15000);
}

async function save() {
    if (!unlocked) return;

    const text = document.getElementById("notes").value;
    const encrypted = await encrypt(text);

    localStorage.setItem("vault", JSON.stringify(encrypted));
    startAutoLock();

    alert("Saved 🔐");
}

document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
        lock();
    }
});
</script>
