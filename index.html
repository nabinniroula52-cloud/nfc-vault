<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NFC Vault</title>

<style>
  body {
    background: #0f172a;
    color: white;
    font-family: sans-serif;
    text-align: center;
    padding: 20px;
  }
  textarea {
    width: 90%;
    height: 200px;
    margin-top: 15px;
    background: #111;
    color: white;
    border: none;
    padding: 10px;
  }
  button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    background: #22c55e;
    color: black;
    font-weight: bold;
  }
</style>
</head>

<body>

<h1>🔐 NFC Vault</h1>
<p id="status">Locked</p>

<button onclick="startScan()">Unlock with NFC</button>

<div id="vault" style="display:none;">
  <textarea id="notes"></textarea><br>
  <button onclick="save()">Save</button>
</div>

<script>
const APPROVED_TAG = "04:9A:92:3C:C8:2A:81";

let unlocked = false;
let autoLockTimer;

async function getKey() {
  const enc = new TextEncoder();
  return crypto.subtle.importKey(
    "raw",
    enc.encode("super-secret-key-123"),
    { name: "AES-GCM" },
    false,
    ["encrypt", "decrypt"]
  );
}

async function encrypt(text) {
  const key = await getKey();
  const iv = crypto.getRandomValues(new Uint8Array(12));

  const encoded = new TextEncoder().encode(text);
  const cipher = await crypto.subtle.encrypt(
    { name: "AES-GCM", iv },
    key,
    encoded
  );

  return {
    iv: Array.from(iv),
    data: Array.from(new Uint8Array(cipher))
  };
}

async function decrypt(iv, data) {
  const key = await getKey();

  const decrypted = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv: new Uint8Array(iv) },
    key,
    new Uint8Array(data)
  );

  return new TextDecoder().decode(decrypted);
}

async function startScan() {
  if (!("NDEFReader" in window)) {
    alert("NFC not supported on this device.");
    return;
  }

  const ndef = new NDEFReader();

  try {
    await ndef.scan();
    document.getElementById("status").innerText = "Tap NFC tag...";

    ndef.onreading = async event => {
      const id = event.serialNumber;

      if (id === APPROVED_TAG) {
        unlock();
      } else {
        document.getElementById("status").innerText = "❌ Wrong Tag";
      }
    };

  } catch (err) {
    alert("Error: " + err);
  }
}

async function unlock() {
  unlocked = true;
  document.getElementById("vault").style.display = "block";
  document.getElementById("status").innerText = "✅ Unlocked";

  const saved = localStorage.getItem("vault");

  if (saved) {
    const parsed = JSON.parse(saved);
    const text = await decrypt(parsed.iv, parsed.data);
    document.getElementById("notes").value = text;
  }

  startAutoLock();
}

function lock() {
  unlocked = false;
  document.getElementById("vault").style.display = "none";
  document.getElementById("notes").value = "";
  document.getElementById("status").innerText = "🔒 Locked";
}

function startAutoLock() {
  clearTimeout(autoLockTimer);

  autoLockTimer = setTimeout(() => {
    lock();
  }, 15000);
}

async function save() {
  if (!unlocked) return;

  const text = document.getElementById("notes").value;
  const encrypted = await encrypt(text);

  localStorage.setItem("vault", JSON.stringify(encrypted));
  startAutoLock();

  alert("Saved 🔐");
}

document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    lock();
  }
});
</script>

</body>
</html>
