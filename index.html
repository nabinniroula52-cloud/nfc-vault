<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NFC Vault</title>
<style>
  body {
    background: #0f172a;
    color: white;
    font-family: sans-serif;
    text-align: center;
    padding: 20px;
  }
  textarea {
    width: 90%;
    height: 150px;
    margin-top: 15px;
    background: #111;
    color: white;
    border: none;
    padding: 10px;
  }
  button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    background: #22c55e;
    color: black;
    font-weight: bold;
  }
  input[type="file"] {
    margin: 10px 0;
    color: white;
  }
  .file-list {
    text-align: left;
    margin: 10px auto;
    width: 90%;
    max-height: 150px;
    overflow-y: auto;
    background: #111;
    padding: 10px;
  }
</style>
</head>
<body>

<h1>🔐 NFC Vault</h1>
<p id="status">Locked</p>
<button onclick="startScan()">Unlock with NFC</button>

<div id="vault" style="display:none;">
  <textarea id="notes" placeholder="Type your notes here..."></textarea><br>
  <input type="file" id="fileInput" multiple><br>
  <button onclick="addFiles()">Add Files</button>
  <div class="file-list" id="fileList"></div>
  <button onclick="save()">Save Vault</button>
</div>

<script>
let APPROVED_TAG = null;
let unlocked = false;
let autoLockTimer;
let fileData = []; // {name, type, contentBase64}

// Restore registered tag on load
window.addEventListener("load", () => {
    const savedTag = localStorage.getItem("registeredTag");
    if (savedTag) APPROVED_TAG = savedTag.toUpperCase().replace(/:/g, '');
    loadVault();
});

async function getKey() {
  const enc = new TextEncoder();
  return crypto.subtle.importKey("raw", enc.encode("super-secret-key-123"), { name: "AES-GCM" }, false, ["encrypt","decrypt"]);
}

async function encrypt(text) {
  const key = await getKey();
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const encoded = new TextEncoder().encode(text);
  const cipher = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, encoded);
  return { iv: Array.from(iv), data: Array.from(new Uint8Array(cipher)) };
}

async function decrypt(iv, data) {
  const key = await getKey();
  const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: new Uint8Array(iv) }, key, new Uint8Array(data));
  return new TextDecoder().decode(decrypted);
}

async function startScan() {
  if (!("NDEFReader" in window)) { alert("NFC not supported on this device."); return; }
  const ndef = new NDEFReader();
  try {
    await ndef.scan();
    document.getElementById("status").innerText = "Tap NFC tag...";
    ndef.onreading = async event => {
      const id = event.serialNumber.replace(/:/g, '').toUpperCase();
      if (!APPROVED_TAG) {
        APPROVED_TAG = id;
        localStorage.setItem("registeredTag", APPROVED_TAG);
        unlock();
        alert("Tag registered and vault unlocked ✅");
      } else if (id === APPROVED_TAG) {
        unlock();
      } else {
        document.getElementById("status").innerText = "❌ Wrong Tag";
      }
    };
  } catch (err) { alert("Error: "+err); }
}

async function unlock() {
  unlocked = true;
  document.getElementById("vault").style.display = "block";
  document.getElementById("status").innerText = "✅ Unlocked";
  loadVault();
  startAutoLock();
}

function lock() {
  unlocked = false;
  document.getElementById("vault").style.display = "none";
  document.getElementById("notes").value = "";
  fileData = [];
  document.getElementById("fileList").innerHTML = "";
  document.getElementById("status").innerText = "🔒 Locked";
}

function startAutoLock() {
  clearTimeout(autoLockTimer);
  autoLockTimer = setTimeout(() => { lock(); }, 15000);
}

function addFiles() {
  const input = document.getElementById("fileInput");
  for (const f of input.files) {
    const reader = new FileReader();
    reader.onload = (e) => {
      fileData.push({name: f.name, type: f.type, contentBase64: e.target.result});
      renderFileList();
    };
    reader.readAsDataURL(f);
  }
  input.value = ""; // reset input
}

function renderFileList() {
  const list = document.getElementById("fileList");
  list.innerHTML = "";
  for (const f of fileData) {
    const div = document.createElement("div");
    if (f.type.startsWith("image/")) {
      const img = document.createElement("img");
      img.src = f.contentBase64;
      img.style.maxWidth = "100px";
      div.appendChild(img);
    }
    const span = document.createElement("span");
    span.innerText = " " + f.name;
    div.appendChild(span);
    list.appendChild(div);
  }
}

async function save() {
  if (!unlocked) return;
  const notesText = document.getElementById("notes").value;
  const vaultObj = {
    notes: await encrypt(notesText),
    files: []
  };
  for (const f of fileData) {
    vaultObj.files.push({
      name: f.name,
      type: f.type,
      content: await encrypt(f.contentBase64)
    });
  }
  localStorage.setItem("vault", JSON.stringify(vaultObj));
  startAutoLock();
  alert("Vault Saved 🔐");
}

async function loadVault() {
  const saved = localStorage.getItem("vault");
  if (!saved) return;
  const vaultObj = JSON.parse(saved);
  if (vaultObj.notes) {
    const notesText = await decrypt(vaultObj.notes.iv, vaultObj.notes.data);
    document.getElementById("notes").value = notesText;
  }
  if (vaultObj.files) {
    fileData = [];
    for (const f of vaultObj.files) {
      const content = await decrypt(f.content.iv, f.content.data);
      fileData.push({name: f.name, type: f.type, contentBase64: content});
    }
    renderFileList();
  }
}

document.addEventListener("visibilitychange", () => { if (document.hidden) lock(); });

</script>
</body>
</html>
