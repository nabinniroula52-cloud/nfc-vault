<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NFC Vault Stable</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{background:#0f172a;color:white;font-family:sans-serif;margin:0;padding:15px;}
button,input,textarea{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none;}
button{background:#22c55e;color:black;font-weight:bold;}
textarea{background:#111;color:white;height:120px;}
.file{background:#111;padding:8px;margin:5px 0;border-radius:6px;display:flex;align-items:center;}
.file img{width:50px;margin-right:10px;cursor:pointer;}
.file button{background:red;color:white;margin-left:5px;}
</style>
</head>

<body>

<h2>🔐 NFC Vault</h2>
<p id="status">🔒 Locked</p>

<button onclick="scan()">Unlock with NFC</button>

<input type="password" id="pass" placeholder="Backup password">
<button onclick="login()">Unlock with Password</button>

<div id="vault" style="display:none;">
<textarea id="notes"></textarea>

<input type="file" id="files" multiple>
<button onclick="addFiles()">Add Files</button>

<div id="list"></div>

<button onclick="saveLock()">Save & Lock</button>

<button onclick="backup()">Export Backup</button>
<input type="file" id="restore">
<button onclick="loadBackup()">Restore Backup</button>

<h3>Logs</h3>
<div id="logs"></div>
</div>

<div id="preview" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:black;justify-content:center;align-items:center;">
<img id="pimg" style="max-width:90%;">
</div>

<script>
let tags=JSON.parse(localStorage.getItem("tags")||"[]");
let files=JSON.parse(localStorage.getItem("files")||"[]");
let logs=JSON.parse(localStorage.getItem("logs")||"[]");

const PASS="04292002";

// NFC
async function scan(){
if(!("NDEFReader" in window)){alert("No NFC");return;}
const n=new NDEFReader();
await n.scan();
document.getElementById("status").innerText="Tap tag...";

n.onreading=e=>{
let id=e.serialNumber.replace(/:/g,'').toUpperCase();

if(tags.length===0){
tags.push({id,name:"Owner"});
saveTags();
unlock("Owner");
return;
}

let t=tags.find(x=>x.id===id);
if(t) unlock(t.name);
else document.getElementById("status").innerText="Wrong tag";
};
}

// Password login
function login(){
if(document.getElementById("pass").value===PASS){
unlock("Password");
}else alert("Wrong password");
}

// Unlock
function unlock(name){
document.getElementById("vault").style.display="block";
document.getElementById("status").innerText="Unlocked: "+name;

document.getElementById("notes").value=localStorage.getItem("notes")||"";
files=JSON.parse(localStorage.getItem("files")||"[]");
render();

logs.push(name+" - "+new Date().toLocaleTimeString());
localStorage.setItem("logs",JSON.stringify(logs));
showLogs();
}

// Lock
function saveLock(){
localStorage.setItem("notes",document.getElementById("notes").value);
localStorage.setItem("files",JSON.stringify(files));
document.getElementById("vault").style.display="none";
document.getElementById("status").innerText="🔒 Locked";
}

// Files
function addFiles(){
let input=document.getElementById("files");
for(let f of input.files){
let r=new FileReader();
r.onload=e=>{
files.push({name:f.name,type:f.type,data:e.target.result});
render();
};
r.readAsDataURL(f);
}
}

function render(){
let div=document.getElementById("list");
div.innerHTML="";
files.forEach((f,i)=>{
let d=document.createElement("div");
d.className="file";

if(f.type.startsWith("image")){
let img=document.createElement("img");
img.src=f.data;
img.onclick=()=>{
document.getElementById("pimg").src=f.data;
document.getElementById("preview").style.display="flex";
};
d.appendChild(img);
}

let a=document.createElement("a");
a.href=f.data;a.innerText=f.name;a.download=f.name;
d.appendChild(a);

let b=document.createElement("button");
b.innerText="X";
b.onclick=()=>{
files.splice(i,1);
render();
};
d.appendChild(b);

div.appendChild(d);
});
}

// Logs
function showLogs(){
let l=document.getElementById("logs");
l.innerHTML=logs.slice().reverse().join("<br>");
}

// Backup
function backup(){
let data={
notes:document.getElementById("notes").value,
files,
tags,
logs
};
let blob=new Blob([JSON.stringify(data)],{type:"application/json"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="vault.json";
a.click();
}

// Restore
function loadBackup(){
let f=document.getElementById("restore").files[0];
if(!f)return;
let r=new FileReader();
r.onload=e=>{
let d=JSON.parse(e.target.result);
localStorage.setItem("notes",d.notes||"");
localStorage.setItem("files",JSON.stringify(d.files||[]));
localStorage.setItem("tags",JSON.stringify(d.tags||[]));
localStorage.setItem("logs",JSON.stringify(d.logs||[]));
alert("Restored");
};
r.readAsText(f);
}

function saveTags(){localStorage.setItem("tags",JSON.stringify(tags));}
</script>

</body>
</html>
