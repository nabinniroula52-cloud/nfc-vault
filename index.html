<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NFC Vault</title>

<style>
body{
background:#0f172a;
color:white;
font-family:sans-serif;
text-align:center;
padding:20px;
}

textarea{
width:90%;
height:150px;
margin-top:10px;
background:#111;
color:white;
border:none;
padding:10px;
}

button{
padding:10px 20px;
margin:6px;
border:none;
background:#22c55e;
color:black;
font-weight:bold;
border-radius:6px;
}

#vault{
display:none;
margin-top:20px;
}

.file{
background:#1e293b;
margin:8px;
padding:10px;
border-radius:8px;
}
</style>
</head>

<body>

<h1>🔐 NFC Vault</h1>

<p id="status">Locked</p>

<button onclick="scanNFC()">Unlock With NFC</button>
<br><br>

<input id="password" placeholder="Backup password">
<button onclick="backupLogin()">Backup Login</button>

<div id="vault">

<h3>Notes</h3>
<textarea id="notes"></textarea>

<br><br>

<input type="file" id="fileInput">
<button onclick="addFile()">Add File</button>

<h3>Stored Files</h3>
<div id="files"></div>

<br>

<button onclick="saveVault()">Save</button>
<button onclick="lockVault()">Lock</button>

</div>

<script>

const BACKUP_PASSWORD = "04292002";

let approvedTags = JSON.parse(localStorage.getItem("tags")) || [];
let files = JSON.parse(localStorage.getItem("files")) || [];

function saveVault(){

localStorage.setItem("notes",
document.getElementById("notes").value)

localStorage.setItem("files",JSON.stringify(files))

alert("Saved")

}

function loadVault(){

document.getElementById("vault").style.display="block"

document.getElementById("notes").value=
localStorage.getItem("notes") || ""

renderFiles()

document.getElementById("status").innerText="Unlocked"

}

function lockVault(){

document.getElementById("vault").style.display="none"

document.getElementById("status").innerText="Locked"

}

async function scanNFC(){

if(!("NDEFReader" in window)){
alert("NFC not supported")
return
}

try{

const reader = new NDEFReader()

await reader.scan()

document.getElementById("status").innerText="Tap NFC tag"

reader.onreading = event => {

let id = event.serialNumber

if(approvedTags.length===0){

approvedTags.push(id)

localStorage.setItem("tags",
JSON.stringify(approvedTags))

alert("First tag registered!")

loadVault()

return
}

if(approvedTags.includes(id)){

loadVault()

}else{

document.getElementById("status").innerText="Wrong tag"

}

}

}catch(err){

alert(err)

}

}

function backupLogin(){

let pass =
document.getElementById("password").value

if(pass===BACKUP_PASSWORD){

loadVault()

}else{

alert("Wrong password")

}

}

function addFile(){

let file =
document.getElementById("fileInput").files[0]

if(!file) return

let reader = new FileReader()

reader.onload = function(){

files.push({
name:file.name,
data:reader.result
})

renderFiles()

}

reader.readAsDataURL(file)

}

function renderFiles(){

let container =
document.getElementById("files")

container.innerHTML=""

files.forEach((f,i)=>{

let div = document.createElement("div")

div.className="file"

div.innerHTML =
`
<b>${f.name}</b><br>
<button onclick="downloadFile(${i})">Download</button>
<button onclick="deleteFile(${i})">Delete</button>
`

container.appendChild(div)

})

}

function downloadFile(i){

let a=document.createElement("a")

a.href=files[i].data

a.download=files[i].name

a.click()

}

function deleteFile(i){

files.splice(i,1)

renderFiles()

saveVault()

}

</script>

</body>
</html>
