<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🔐 NFC Vault Fun</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {margin:0;padding:0;background:#0f172a;color:white;font-family:sans-serif;}
.container {padding:15px; max-width:600px;margin:auto;}
h1 {text-align:center;margin-bottom:10px;}
p#status {text-align:center;font-weight:bold;margin-bottom:15px;}
button,input[type="file"],input[type="text"],input[type="password"],textarea {
    width:100%;padding:12px;margin:5px 0;border:none;border-radius:8px;font-size:16px;}
button {background:#22c55e;color:black;font-weight:bold;}
textarea {background:#111;color:white;height:150px;resize:none;}
.file-list {background:#111;padding:10px;border-radius:8px;max-height:200px;overflow-y:auto;margin-top:10px;}
.file-item {margin:5px 0;display:flex;align-items:center;justify-content:flex-start;}
.file-item img {max-width:60px;max-height:60px;margin-right:10px;border-radius:6px;}
.file-item a {color:#22c55e;text-decoration:none;flex:1;word-break:break-all;}
.card {background:#111;padding:15px;border-radius:12px;margin:15px 0;}
.card h3 {margin-top:0;}
.card button {width:auto;margin-top:5px;padding:8px 12px;}
ul {list-style:none;padding-left:0;max-height:150px;overflow-y:auto;}
ul li {padding:5px 0;border-bottom:1px solid #333;display:flex;justify-content:space-between;align-items:center;}
ul li span {color:#22c55e;}
ul li button {background:red;color:white;padding:2px 6px;border-radius:4px;}
</style>
</head>
<body>
<div class="container">
<h1>🔐 NFC Vault Fun</h1>
<p id="status">Locked</p>
<button onclick="startScan()">Unlock with NFC</button>

<div id="vault" style="display:none;">
<textarea id="notes" placeholder="Type your notes here..."></textarea>
<input type="file" id="fileInput" multiple>
<button onclick="addFiles()">Add Files</button>
<div class="file-list" id="fileList"></div>
<button onclick="saveAndLock()">Save & Lock 🔒</button>
<button onclick="clearVault()" style="background:red;color:white;">Clear Vault 🗑️</button>

<div class="card" id="nfcManager">
<h3>🔑 Manage NFC Tags</h3>
<input type="password" id="manualPassword" placeholder="Password to register tag">
<input type="text" id="tagNickname" placeholder="Nickname for new tag">
<button onclick="scanForNewTag()">Register New Tag</button>
<ul id="tagList"></ul>
</div>

<div class="card" id="logManager">
<h3>📜 Unlock Log</h3>
<button onclick="renderLog()">Refresh Log</button>
<ul id="logList"></ul>
</div>
</div>
</div>

<script>
let APPROVED_TAGS=[];
let unlocked=false;
let fileData=[];
let unlockLog=[];
const REG_PASSWORD="04292002";

// Load saved tags & logs
const savedTags=localStorage.getItem("approvedTags");
if(savedTags) APPROVED_TAGS=JSON.parse(savedTags);

const savedLog=localStorage.getItem("unlockLog");
if(savedLog) unlockLog=JSON.parse(savedLog);

// NFC scan & auto-register first tag
async function startScan(){
if(!("NDEFReader" in window)){alert("NFC not supported");return;}
const ndef=new NDEFReader();
try{
await ndef.scan();
document.getElementById("status").innerText="Tap NFC tag...";
ndef.onreading=event=>{
let id=event.serialNumber.replace(/:/g,'').toUpperCase();
if(APPROVED_TAGS.length===0){
APPROVED_TAGS.push({id,nickname:"Owner"});
localStorage.setItem("approvedTags",JSON.stringify(APPROVED_TAGS));
alert("First tag auto-registered as 'Owner'");
unlockVault();
return;
}
const tag=APPROVED_TAGS.find(t=>t.id===id);
if(tag){logUnlock(tag.nickname);unlockVault();}
else{document.getElementById("status").innerText="❌ Wrong Tag";}
};
}catch(e){alert("Error: "+e);}
}

// Unlock / Lock
function unlockVault(){
unlocked=true;
document.getElementById("vault").style.display="block";
document.getElementById("status").innerText="✅ Unlocked";
loadVault();
renderTagList();
renderLog();
}

function saveAndLock(){
if(!unlocked) return;
saveVault();
lockUI();
}

function lockUI(){
unlocked=false;
document.getElementById("vault").style.display="none";
document.getElementById("notes").value="";
fileData=[];
document.getElementById("fileList").innerHTML="";
document.getElementById("status").innerText="🔒 Locked";
}

// Files
function addFiles(){
const input=document.getElementById("fileInput");
for(const f of input.files){
const reader=new FileReader();
reader.onload=e=>{
fileData.push({name:f.name,type:f.type,content:e.target.result});
renderFileList();
};
reader.readAsDataURL(f);
}
input.value="";
}

function renderFileList(){
const list=document.getElementById("fileList");
list.innerHTML="";
for(const f of fileData){
const div=document.createElement("div");
div.className="file-item";
if(f.type.startsWith("image/")){
const img=document.createElement("img");
img.src=f.content;
div.appendChild(img);
}
const link=document.createElement("a");
link.href=f.content;
link.download=f.name;
link.innerText=f.name+" ⬇️";
div.appendChild(link);
list.appendChild(div);
}
}

// Save vault (notes + files)
function saveVault(){
localStorage.setItem("notes",document.getElementById("notes").value);
localStorage.setItem("files",JSON.stringify(fileData));
}

// Load vault
function loadVault(){
const savedNotes=localStorage.getItem("notes");
if(savedNotes) document.getElementById("notes").value=savedNotes;
const savedFiles=localStorage.getItem("files");
if(savedFiles) fileData=JSON.parse(savedFiles);
renderFileList();
}

// Tag management
function renderTagList(){
const list=document.getElementById("tagList");
list.innerHTML="";
APPROVED_TAGS.forEach((tag,index)=>{
const li=document.createElement("li");
li.innerText=tag.nickname||("••••••"+tag.id.slice(-6));
const btn=document.createElement("button");
btn.innerText="Remove";
btn.onclick=()=>{
APPROVED_TAGS.splice(index,1);
localStorage.setItem("approvedTags",JSON.stringify(APPROVED_TAGS));
renderTagList();
};
li.appendChild(btn);
list.appendChild(li);
});
}

// Manual password registration
function scanForNewTag(){
const pass=document.getElementById("manualPassword").value;
if(pass!==REG_PASSWORD){alert("Wrong password");return;}
const nickname=document.getElementById("tagNickname").value||"Unnamed";
if(!("NDEFReader" in window)){alert("NFC not supported");return;}
const ndef=new NDEFReader();
ndef.scan().then(()=>{
alert("Tap NFC tag to register...");
ndef.onreading=event=>{
const id=event.serialNumber.replace(/:/g,'').toUpperCase();
if(!APPROVED_TAGS.find(t=>t.id===id)){
APPROVED_TAGS.push({id,nickname});
localStorage.setItem("approvedTags",JSON.stringify(APPROVED_TAGS));
renderTagList();
alert("Tag registered ✅");
}else alert("Tag already registered");
};
}).catch(err=>alert("Error: "+err));
}

// Logs
function logUnlock(nickname){
unlockLog.push({nickname,timestamp:new Date().toLocaleString()});
localStorage.setItem("unlockLog",JSON.stringify(unlockLog));
renderLog();
}

function renderLog(){
const list=document.getElementById("logList");
list.innerHTML="";
unlockLog.slice().reverse().forEach(entry=>{
const li=document.createElement("li");
li.innerHTML=`<span>${entry.timestamp}</span>: ${entry.nickname}`;
list.appendChild(li);
});
}

// Clear vault
function clearVault(){
if(!confirm("Delete ALL notes, files, tags, and logs?")) return;
localStorage.clear();
fileData=[];
APPROVED_TAGS=[];
unlockLog=[];
document.getElementById("notes").value="";
document.getElementById("fileList").innerHTML="";
renderTagList();
renderLog();
lockUI();
}
</script>
</body>
</html>
