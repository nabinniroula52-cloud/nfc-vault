<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NFC Vault</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #121212;
            color: #f0f0f0;
        }
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            margin: 20px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #6200ee;
            color: white;
        }
        #vault {
            display: none;
            margin-top: 20px;
            width: 90%;
            max-width: 500px;
            height: 300px;
            background: #1e1e1e;
            border: 2px solid #6200ee;
            padding: 10px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>NFC Vault 🔐</h1>
    <button id="scanBtn">Unlock with NFC</button>
    <div id="vault" contenteditable="true">
        <p>Your secret notes go here...</p>
    </div>

    <script>
        const APPROVED_TAG = "04:9A:92:3C:C8:2A:81";

        const scanBtn = document.getElementById('scanBtn');
        const vault = document.getElementById('vault');

        async function startScan() {
            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    ndef.onreading = event => {
                        const tagId = event.serialNumber;
                        console.log("Scanned tag:", tagId);
                        if (tagId === APPROVED_TAG) {
                            vault.style.display = "block";
                            scanBtn.style.display = "none";
                        } else {
                            alert("Wrong tag! ❌");
                        }
                    };
                } catch (error) {
                    alert("Error scanning NFC: " + error);
                }
            } else {
                alert("Web NFC is not supported on this device/browser.");
            }
        }

        scanBtn.addEventListener('click', startScan);
    </script>
</body>
</html>
